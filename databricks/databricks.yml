# Databricks Asset Bundle (DAB) — infrastructure-as-code for Databricks.
# Declares the BrewQuality job (a Workflow), the wheel artifact, and per-env
# targets. Deploy:  databricks bundle deploy -t dev   (then ...-t staging / prod)
#
# Each target maps to its own Unity Catalog catalog (env isolation) — the local
# data/lake/<layer> folders become <catalog>.<layer>.<table> on the platform.

bundle:
  name: brewquality

# Build the package as a wheel so job tasks import the same tested code as CI.
artifacts:
  brewquality_wheel:
    type: whl
    build: python -m build --wheel
    path: ..

variables:
  catalog:
    description: Unity Catalog catalog for this environment.

targets:
  dev:
    mode: development          # prefixes resources, pauses schedules
    default: true
    variables:
      catalog: brewquality_dev
    workspace:
      host: https://adb-XXXX.azuredatabricks.net

  staging:
    variables:
      catalog: brewquality_staging
    workspace:
      host: https://adb-XXXX.azuredatabricks.net

  prod:
    mode: production
    variables:
      catalog: brewquality_prod
    workspace:
      host: https://adb-XXXX.azuredatabricks.net

resources:
  jobs:
    brewquality_pipeline:
      name: "[${bundle.target}] BrewQuality DQ pipeline"
      # ingest -> validate (DQ gate) -> build gold -> publish KPIs, with retries.
      tasks:
        - task_key: bronze_ingest
          notebook_task:
            notebook_path: ./notebooks/01_bronze_ingest.py
            base_parameters:
              catalog: ${var.catalog}

        - task_key: silver_dq_gate
          depends_on:
            - task_key: bronze_ingest
          notebook_task:
            notebook_path: ./notebooks/02_silver_dq_gate.py
            base_parameters:
              catalog: ${var.catalog}
          # one retry on transient failure (cluster/spot), then alert.
          max_retries: 1
          min_retry_interval_millis: 60000

        - task_key: gold_build
          depends_on:
            - task_key: silver_dq_gate
          notebook_task:
            notebook_path: ./notebooks/03_gold_build.py
            base_parameters:
              catalog: ${var.catalog}

      schedule:
        quartz_cron_expression: "0 0 6 * * ?"   # daily 06:00
        timezone_id: Europe/Warsaw
        pause_status: PAUSED

      email_notifications:
        on_failure:
          - data-quality-team@example.com

      # Jobs cluster: spins up for the run, tears down after (cost-efficient for
      # automated pipelines). On Free Edition this is serverless instead.
      job_clusters:
        - job_cluster_key: default
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: Standard_DS3_v2
            autoscale:
              min_workers: 1
              max_workers: 4
